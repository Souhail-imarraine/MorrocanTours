name: MoroccanTours

on:
  push:
    branches:
      - "**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.MOROCCAN_USERNAME}}
          password: ${{ secrets.MOROCCAN_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker compose build
          docker tag sugerline-app:latest ${{ secrets.MOROCCAN_USERNAME }}/MOROCCANTOURS-app:latest
          docker push ${{ secrets.MOROCCAN_USERNAME }}/MOROCCANTOURS-app:latest