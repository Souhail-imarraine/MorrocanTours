name: MoroccanTours CI/CD

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

jobs:
  # 1. Backend CI (Java/Maven)
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test Backend
        run: |
          cd backend
          mvn clean install -DskipTests=false

  # 2. Frontend CI (Angular/Npm)
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build -- --configuration production

  # 3. Docker Verification
  docker-check:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose config

  # 4. Build and Push to Docker Hub (Only on Main)
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.MOROCCAN_USERNAME }}
          password: ${{ secrets.MOROCCAN_TOKEN }}

      - name: Build and Push Images
        run: |
          # Build images
          docker compose build
          
          # Tag and Push Backend
          docker tag moroccan-tours-backend:latest ${{ secrets.MOROCCAN_USERNAME }}/moroccan-tours-backend:latest
          docker push ${{ secrets.MOROCCAN_USERNAME }}/moroccan-tours-backend:latest
          
          # Tag and Push Frontend
          docker tag moroccan-tours-frontend:latest ${{ secrets.MOROCCAN_USERNAME }}/moroccan-tours-frontend:latest
          docker push ${{ secrets.MOROCCAN_USERNAME }}/moroccan-tours-frontend:latest
