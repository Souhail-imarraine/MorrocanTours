server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: MoroccanTours
  datasource:
    url: jdbc:mysql://localhost:3306/moroccan_tourss?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: change-me-please-change-me-please-123456
  expiration: 86400000 # 24h in ms

file:
  upload-dir: ./uploads

logging:
  level:
    org.springframework.security: INFO
