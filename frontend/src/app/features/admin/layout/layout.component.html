<!-- Mobile overlay -->
@if (sidebarOpen()) {
  <div class="fixed inset-0 z-40 bg-black/50 lg:hidden" (click)="closeSidebar()"></div>
}

<div class="flex h-screen bg-[#f5f6fa] overflow-hidden">

  <!-- Sidebar -->
  <aside [class]="sidebarOpen()
    ? 'fixed inset-y-0 left-0 z-50 w-64 flex flex-col bg-[#0f1117] translate-x-0 transition-transform duration-200 lg:relative lg:translate-x-0'
    : 'fixed inset-y-0 left-0 z-50 w-64 flex flex-col bg-[#0f1117] -translate-x-full transition-transform duration-200 lg:relative lg:translate-x-0'">

    <!-- Logo -->
    <div class="flex items-center h-16 px-6 border-b border-white/10 flex-shrink-0">
      <a routerLink="/" class="flex items-center gap-2.5 no-underline group hover:opacity-80 transition-opacity">
        <img src="Logo.png" alt="MoroccanTours" class="h-8 w-auto brightness-0 invert">
        <div class="flex flex-col">
          <span class="text-white font-black text-[11px] tracking-tight leading-none uppercase tracking-widest">Admin</span>
          <span class="text-[9px] font-bold text-orange-500 uppercase tracking-widest mt-1">Authority</span>
        </div>
      </a>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto px-3 py-5 space-y-1">
      <p class="px-3 text-[10px] font-bold uppercase text-white/30 tracking-widest mb-3">Overview</p>

      <a routerLink="/admin/dashboard" routerLinkActive="bg-orange-500 text-white"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-white/60
                hover:bg-white/10 hover:text-white transition-all no-underline"
         (click)="closeSidebar()">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>

      <p class="px-3 text-[10px] font-bold uppercase text-white/30 tracking-widest mb-3 mt-5">Management</p>

      <a routerLink="/admin/users" routerLinkActive="bg-orange-500 text-white"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-white/60
                hover:bg-white/10 hover:text-white transition-all no-underline"
         (click)="closeSidebar()">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Users
      </a>

      <a routerLink="/admin/categories" routerLinkActive="bg-orange-500 text-white"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-white/60
                hover:bg-white/10 hover:text-white transition-all no-underline"
         (click)="closeSidebar()">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        Categories
      </a>

      <a routerLink="/admin/languages" routerLinkActive="bg-orange-500 text-white"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-white/60
                hover:bg-white/10 hover:text-white transition-all no-underline"
         (click)="closeSidebar()">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 5h16"/><path d="M9 9h11"/><path d="M9 13h11"/><path d="M4 17h16"/><path d="M5 9l2 4 2-4"/>
        </svg>
        Languages
      </a>
    </nav>

    <!-- User footer -->
    <div class="px-4 py-4 border-t border-white/10 flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold text-xs flex-shrink-0">
          A
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold text-white truncate">{{ authService.currentUser()?.email }}</p>
          <p class="text-[10px] text-orange-400 font-semibold">Administrator</p>
        </div>
        <button (click)="logout()" title="Sign out" class="text-white/40 hover:text-red-400 transition-colors flex-shrink-0">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main area -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">

    <!-- Top bar -->
    <header class="h-16 bg-white border-b border-gray-100 flex items-center px-4 sm:px-6 flex-shrink-0">
      <button (click)="toggleSidebar()" class="lg:hidden mr-4 text-gray-500 hover:text-gray-700 transition-colors">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h2 class="text-sm font-semibold text-gray-600 hidden sm:block">Admin Control Panel</h2>
      <div class="ml-auto flex items-center gap-3">
        <span class="hidden sm:inline-flex items-center gap-1.5 px-3 py-1 bg-orange-50 text-orange-600 text-xs font-bold rounded-full">
          <span class="w-1.5 h-1.5 bg-orange-500 rounded-full"></span>
          ADMIN
        </span>
        <div class="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold text-xs">A</div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
