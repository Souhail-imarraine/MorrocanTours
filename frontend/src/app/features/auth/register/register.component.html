<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <div>
      <h2 class="mt-4 text-center text-3xl font-extrabold text-gray-900">Créer un compte</h2>
    </div>
    <form class="mt-8 space-y-6" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div *ngIf="error" class="bg-red-50 text-red-700 p-3 rounded-md text-sm text-center">
        {{ error }}
      </div>
      <div *ngIf="success" class="bg-green-50 text-green-700 p-3 rounded-md text-sm text-center">
        {{ success }} <br> <a routerLink="/login" class="underline font-bold mt-2 inline-block">Se connecter</a>
      </div>

      <div class="rounded-md shadow-sm space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="sr-only">Prénom</label>
            <input type="text" formControlName="firstName" class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Prénom">
          </div>
          <div>
            <label class="sr-only">Nom</label>
            <input type="text" formControlName="lastName" class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Nom">
          </div>
        </div>

        <div>
          <label class="sr-only">Email</label>
          <input type="email" formControlName="email" class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Adresse Email">
        </div>
        
        <div>
          <label class="sr-only">Mot de passe</label>
          <input type="password" formControlName="password" class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Mot de passe (Min 6)">
        </div>

        <div>
           <label class="block text-sm font-medium text-gray-700 mb-1">Je souhaite m'inscrire en tant que :</label>
           <select formControlName="role" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
              <option value="TOURIST">Touriste</option>
              <option value="GUIDE">Guide Touristique</option>
           </select>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="registerForm.invalid" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none disabled:bg-blue-300 transition duration-150">
          S'inscrire
        </button>
      </div>
      
      <div class="text-center mt-4 flex justify-between">
        <a routerLink="/" class="text-sm text-gray-500 hover:text-gray-900">Retour à l'accueil</a>
        <a routerLink="/login" class="text-sm font-medium text-blue-600 hover:text-blue-500">J'ai déjà un compte</a>
      </div>
    </form>
  </div>
</div>
