<app-navbar></app-navbar>

<div class="pt-[74px] bg-[#fcfcfc] min-h-screen">
  <div class="max-w-[800px] mx-auto px-6 py-12">

    @if (saveSuccess()) {
    <div
      class="mb-6 flex items-center gap-3 px-5 py-4 bg-green-50 border border-green-100 rounded-2xl text-sm font-bold text-green-700 animate-in fade-in slide-in-from-top-4">
      <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <polyline points="20 6 9 17 4 12" />
      </svg>
      Changes saved successfully!
    </div>
    }

    @if (saveError()) {
    <div class="mb-6 px-5 py-4 bg-red-50 border border-red-100 rounded-2xl text-sm font-bold text-red-600">
      ⚠ {{ saveError() }}
    </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">


      <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
        <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-8">Personal Details</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">First Name</label>
            <input formControlName="firstName" type="text"
              [class]="isInvalid('firstName') ? 'border-red-500 focus:ring-red-500/10' : 'border-transparent focus:border-orange-500 focus:ring-orange-500/10'"
              class="w-full px-5 py-4 bg-gray-50 border rounded-2xl text-sm font-bold text-gray-900 outline-none transition-all">
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Last Name</label>
            <input formControlName="lastName" type="text"
              [class]="isInvalid('lastName') ? 'border-red-500 focus:ring-red-500/10' : 'border-transparent focus:border-orange-500 focus:ring-orange-500/10'"
              class="w-full px-5 py-4 bg-gray-50 border rounded-2xl text-sm font-bold text-gray-900 outline-none transition-all">
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Phone Number</label>
            <input formControlName="phone" type="tel" placeholder="+212 600 000 000"
              class="w-full px-5 py-4 bg-gray-50 border border-transparent rounded-2xl text-sm font-bold text-gray-900 focus:bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 outline-none transition-all">
          </div>

          <div class="space-y-2">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Your City</label>
            <input formControlName="city" type="text" placeholder="Marrakech, Casablanca..."
              class="w-full px-5 py-4 bg-gray-50 border border-transparent rounded-2xl text-sm font-bold text-gray-900 focus:bg-white focus:border-orange-500 focus:ring-4 focus:ring-orange-500/10 outline-none transition-all">
          </div>

          <div class="md:col-span-2 space-y-2 pt-4">
            <label class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-1">Login Email</label>
            <div
              class="w-full px-5 py-4 bg-gray-100/50 border border-gray-100 rounded-2xl text-sm font-bold text-gray-400 flex items-center justify-between">
              {{ authService.currentUser()?.email }}
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </div>
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest ml-1">Email cannot be changed</p>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-end">
        <button type="submit" [disabled]="saving()"
          class="px-12 py-4 bg-gray-900 text-white text-sm font-black rounded-2xl hover:bg-orange-500 shadow-xl shadow-gray-900/10 hover:shadow-orange-500/20 transition-all flex items-center gap-3">
          @if (saving()) {
          <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
          </svg>
          Saving Profile...
          } @else {
          Save My Profile
          }
        </button>
      </div>

    </form>
  </div>
</div>
