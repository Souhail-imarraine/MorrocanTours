version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: moroccan-tours-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: moroccan_tourss
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -u root -proot"]
      timeout: 20s
      retries: 10
      interval: 10s

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moroccan-tours-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://moroccan-tours-db:3306/moroccan_tourss?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      FILE_UPLOAD_DIR: ./uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moroccan-tours-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  mysql_data:
